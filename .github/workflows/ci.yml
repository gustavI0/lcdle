name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHPCS (Drupal standard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2
      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run PHPCS
        run: vendor/bin/phpcs --standard=phpcs.xml.dist

  static-analysis:
    name: PHPStan (level 6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2
      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

  unit-tests:
    name: PHPUnit (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2
      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist --no-progress
      - name: Run PHPUnit unit suite
        run: vendor/bin/phpunit --testsuite=unit
